kind = "web"
previewPath = "/"
title = "Food Truck Marketplace"
version = "1.0.0"
id = "artifacts/food-truck-marketplace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22925

[services.development]
run = "pnpm --filter @workspace/food-truck-marketplace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/food-truck-marketplace", "run", "build" ]
publicDir = "artifacts/food-truck-marketplace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22925"
BASE_PATH = "/"
